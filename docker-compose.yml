services:
  mongodb:
    image: mongo:7
    container_name: legal-rag-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    container_name: legal-rag-rag-service
    user: "0:0"
    restart: unless-stopped
    env_file:
      - ./rag-service/.env
    environment:
      - PYTHONUNBUFFERED=1
      - GROQ_MODEL=llama-3.1-8b-instant
      - HF_HOME=/home/appuser/.cache/huggingface
      - TRANSFORMERS_CACHE=/home/appuser/.cache/huggingface/transformers
      - SENTENCE_TRANSFORMERS_HOME=/home/appuser/.cache/torch/sentence_transformers
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/home/appuser/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 20s
      timeout: 7s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: ./backend-mern
      dockerfile: Dockerfile
    container_name: legal-rag-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      rag-service:
        condition: service_healthy
    env_file:
      - ./backend-mern/.env
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/legal_rag
      - RAG_SERVICE_URL=http://rag-service:8000
      - CLIENT_URL=http://localhost:5173
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: legal-rag-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  mongo_data:
  hf_cache:
